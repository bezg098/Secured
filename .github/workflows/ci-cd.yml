name: Secured CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # manual trigger for production deploys

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-west1
  REPO: secured
  IMAGE: secured-app

jobs:
  build-scan-deploy:
    name: Build, Scan, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC auth with GCP

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP via OIDC ─────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── 3. Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }} \
            ./backend

      # ── 4. Snyk SAST — scan Python source code ──────────────────────────────
      - name: Snyk SAST scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=critical ./backend

      # ── 5. Snyk SCA — scan dependencies ─────────────────────────────────────
      - name: Snyk dependency scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical ./backend

      # ── 6. Snyk container scan ───────────────────────────────────────────────
      - name: Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          args: --severity-threshold=critical

      # ── 7. Push image to Artifact Registry ───────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Push image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}

      # ── 8. Terraform deploy to Cloud Run (staging) ───────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (app)
        working-directory: terraform/app
        run: terraform init

      - name: Terraform apply (app)
        working-directory: terraform/app
        run: |
          terraform apply -auto-approve \
            -var="project_id=$PROJECT_ID" \
            -var="region=$REGION" \
            -var="image_tag=${{ github.sha }}"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

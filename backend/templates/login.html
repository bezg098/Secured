{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:400px; margin:60px auto;">
  <div class="card">
    <h1 style="text-align:center; margin-bottom:4px;">Welcome back</h1>
    <p class="text-muted" style="text-align:center; margin-bottom:24px;">Sign in to your Secured account</p>
    <form method="POST">
      <label>Username
        <input type="text" name="username" required autofocus>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button class="btn btn-primary" style="width:100%; margin-top:22px;">Sign in</button>
    </form>
    <p class="text-muted" style="text-align:center; margin-top:16px;">
      No account? <a href="/register" style="color:#1a3a5c;">Register here</a>
    </p>
  </div>
</div>
{% endblock %}

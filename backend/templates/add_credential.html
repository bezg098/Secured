{% extends 'base.html' %}
{% block title %}Add Credential{% endblock %}
{% block content %}
<div style="max-width:500px; margin:0 auto;">
  <div class="card">
    <h1 style="margin-bottom:4px;">Add a credential</h1>
    <p class="text-muted" style="margin-bottom:20px;">Track an API key, password, or certificate expiration</p>
    <form method="POST">
      <label>Credential name
        <input type="text" name="name" placeholder="e.g. AWS Production API Key" required autofocus>
      </label>
      <label>Type
        <select name="cred_type" required>
          <option value="">Select a type</option>
          <option value="API Key">API Key</option>
          <option value="Password">Password</option>
          <option value="Certificate">Certificate</option>
          <option value="SSH Key">SSH Key</option>
          <option value="OAuth Token">OAuth Token</option>
          <option value="Other">Other</option>
        </select>
      </label>
      <label>Expiration date
        <input type="date" name="expires_on" required>
      </label>
      <div style="display:flex; gap:12px; margin-top:24px;">
        <button class="btn btn-primary" style="flex:1;">Save credential</button>
        <a href="/dashboard" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
